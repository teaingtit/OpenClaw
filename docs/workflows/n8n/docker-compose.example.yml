# n8n Standalone Reference — example compose for a fresh n8n instance.
# NOTE: The production instance is 'sain-n8n' managed by a separate compose.
#       Do NOT run this file on minipc unless you want a SECOND n8n on port 5678.
# Start:  docker compose -f docs/workflows/n8n/docker-compose.example.yml up -d
# Logs:   docker compose -f docs/workflows/n8n/docker-compose.example.yml logs -f n8n
# Access: http://localhost:5678
services:
  n8n:
    image: n8nio/n8n:latest
    container_name: n8n
    ports:
      - "5678:5678"
    environment:
      - N8N_HOST=0.0.0.0
      - N8N_PORT=5678
      - N8N_PROTOCOL=http
      - GENERIC_TIMEZONE=Asia/Bangkok
      - TZ=Asia/Bangkok
      - N8N_SECURE_COOKIE=false
      # Ollama on ryzenpc (Tailscale)
      - OLLAMA_BASE_URL=http://100.82.51.31:11434
      # OpenClaw gateway on localhost (systemd)
      - OPENCLAW_GATEWAY_URL=http://host.docker.internal:18789
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - n8n_data:/home/node/.n8n
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:5678/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

volumes:
  n8n_data:
