# Open WebUI on minipc — connects to Ollama on ryzenpc (Tailscale).
# Start:  docker compose -f docs/workflows/open-webui/docker-compose.example.yml up -d
# Logs:   docker compose -f docs/workflows/open-webui/docker-compose.example.yml logs -f open-webui
# Access: http://100.96.9.50:3000 (or http://localhost:3000 when on minipc)
# First run: create admin user in the UI.
services:
  open-webui:
    image: ghcr.io/open-webui/open-webui:main
    container_name: open-webui
    ports:
      - "3000:8080"
    environment:
      # Ollama on ryzenpc (Tailscale IP)
      - OLLAMA_BASE_URL=http://100.82.51.31:11434
      - OLLAMA_API_BASE_URL=http://100.82.51.31:11434
      - WEBUI_AUTH=true
      - WEBUI_URL=http://100.96.9.50:3000
    volumes:
      - open_webui_data:/app/backend/data
    restart: unless-stopped

volumes:
  open_webui_data:
